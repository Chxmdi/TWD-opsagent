services:
  - type: web
    name: wealth-dojo-operations
    runtime: node
    region: ohio
    plan: free
    numInstances: 1
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCHEDULER
        value: "on"
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: MCP_REQUIRED_SCOPES
        value: operations:read operations:write
      - key: OPENAI_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_TASKS_DATA_SOURCE_ID
        sync: false
      - key: NOTION_PROJECTS_DATA_SOURCE_ID
        sync: false
      - key: NOTION_DEFAULT_PROJECT_PAGE_ID
        sync: false
      - key: NOTION_CONTEXT_PAGE_IDS
        sync: false
      - key: CONTEXT_REFRESH_MINUTES
        value: "15"
      - key: GMAIL_SYNC_QUERY
        value: newer_than:30d
      - key: GMAIL_SYNC_LIMIT
        value: "25"
      - key: CALENDAR_SYNC_DAYS
        value: "90"
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MCP_RESOURCE_URL
        sync: false
      - key: SINGLE_USER_EMAIL
        sync: false
      - key: SINGLE_USER_PASSWORD
        sync: false
      - key: OAUTH_SIGNING_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: EVENTBRITE_EVENT_ID
        sync: false
      - key: BUFFER_TOKEN
        sync: false
      - key: BUFFER_PROFILE_ID
        sync: false
