services:
  - type: web
    name: wealth-dojo-operations
    runtime: node
    region: ohio
    plan: free
    numInstances: 1
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCHEDULER
        value: "on"
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: MCP_REQUIRED_SCOPES
        value: operations:read operations:write
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MCP_RESOURCE_URL
        sync: false
      - key: SINGLE_USER_EMAIL
        sync: false
      - key: SINGLE_USER_PASSWORD
        sync: false
      - key: OAUTH_SIGNING_SECRET
        generateValue: true
