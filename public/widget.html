<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{font-family:ui-sans-serif,system-ui;color:#10241b;background:#f5f3ec}*{box-sizing:border-box}body{margin:0;padding:14px}.shell{background:#fffdf7;border:1px solid #d9ddd5;border-radius:16px;overflow:hidden}.head{background:#103b2a;color:white;padding:18px}.head small{color:#c9ff4c;letter-spacing:.12em}.head h2{font-family:Georgia,serif;margin:6px 0 0;font-weight:500}.metrics{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #ddd}.metric{padding:14px;border-right:1px solid #ddd}.metric:last-child{border:0}.metric b{font-size:22px;display:block}.metric span{font-size:10px;color:#65726c}.section{padding:16px}.section h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#65726c}.item{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-top:1px solid #e3e5df;font-size:12px}.item:first-of-type{border-top:0}.badge{background:#e8eee8;border-radius:99px;padding:4px 7px;font-size:9px;white-space:nowrap}@media(max-width:520px){.metrics{grid-template-columns:1fr 1fr}.metric:nth-child(2){border-right:0}}
  </style>
</head>
<body>
  <main class="shell"><header class="head"><small>WEALTH DOJO OPERATIONS</small><h2>The Wealth Dojo Experience | RESET</h2></header><div class="metrics" id="metrics"></div><section class="section"><h3>Priority tasks</h3><div id="tasks"></div></section><section class="section"><h3>Top sponsor leads</h3><div id="sponsors"></div></section><section class="section"><h3>Volunteers &amp; vendors</h3><div id="people"></div></section></main>
  <script type="module">
    const metrics=document.querySelector("#metrics"),tasks=document.querySelector("#tasks"),sponsors=document.querySelector("#sponsors"),people=document.querySelector("#people");
    function render(result){const data=result?.structuredContent||result||{};const open=(data.tasks||[]).filter(t=>t.status!=="Done");const active=(data.sponsors||[]).filter(s=>s.stage!=="Research");const drafts=(data.outreach||[]).filter(d=>d.status==="Needs approval").length+((data.commsDrafts||[]).filter(d=>d.status==="Needs approval").length);const ready=(data.volunteers||[]).filter(v=>["Onboarded","Scheduled","Active"].includes(v.stage));const booked=(data.vendors||[]).filter(v=>["Booked","Confirmed","Completed"].includes(v.status));const openLogistics=(data.logistics||[]).filter(l=>!["Confirmed","Done"].includes(l.status));const activeCampaigns=(data.campaigns||[]).filter(c=>c.status==="Active");metrics.innerHTML=[[open.length,"Open tasks"],[active.length,"Active leads"],[`${ready.length}/${(data.volunteers||[]).length}`,"Volunteers ready"],[`${booked.length}/${(data.vendors||[]).length}`,"Vendors booked"],[openLogistics.length,"Open logistics"],[activeCampaigns.length,"Active campaigns"],[drafts,"Pending drafts"],[`${data.event?.ticketsSold??0}/${data.event?.ticketGoal??0}`,"Tickets"]].map(([v,l])=>`<div class="metric"><b>${v}</b><span>${l}</span></div>`).join("");tasks.innerHTML=open.slice(0,4).map(t=>`<div class="item"><span>${t.title}</span><span class="badge">${t.status}</span></div>`).join("")||"<p>No open tasks.</p>";sponsors.innerHTML=(data.sponsors||[]).sort((a,b)=>b.fit-a.fit).slice(0,4).map(s=>`<div class="item"><span>${s.name}</span><span class="badge">${s.fit}% · ${s.stage}</span></div>`).join("")||"<p>No sponsor leads.</p>";people.innerHTML=[...(data.volunteers||[]).slice(0,3).map(v=>`<div class="item"><span>${v.name} — ${v.role}</span><span class="badge">${v.stage}</span></div>`),...(data.vendors||[]).slice(0,3).map(v=>`<div class="item"><span>${v.name} — ${v.category}</span><span class="badge">${v.status}</span></div>`)].join("")||"<p>No volunteers or vendors yet.</p>"}
    window.addEventListener("message",event=>{if(event.source!==window.parent)return;const msg=event.data;if(msg?.jsonrpc==="2.0"&&msg.method==="ui/notifications/tool-result")render(msg.params)},{passive:true});
    if(window.openai?.toolOutput)render(window.openai.toolOutput);
  </script>
</body>
</html>
