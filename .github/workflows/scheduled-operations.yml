name: Scheduled operations and backup

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

concurrency:
  group: wealth-dojo-scheduled-operations
  cancel-in-progress: false

jobs:
  run-operations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wake service and run scheduled operations
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_BASE_URL"
          test -n "$CRON_SECRET"
          curl --fail-with-body --retry 4 --retry-delay 20 --max-time 180 \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_BASE_URL/internal/scheduler"

  backup-database:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Export PostgreSQL backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/backup-postgres.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: wealth-dojo-database-${{ github.run_id }}
          path: backups/*.json
          retention-days: 14
          if-no-files-found: error
